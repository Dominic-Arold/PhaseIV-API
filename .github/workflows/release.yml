name: Release

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - uses: astral-sh/setup-uv@v5

      - run: uv sync --all-groups

      - run: uv run pytest

  publish:
    needs: test
    runs-on: ubuntu-latest

    environment: pypi   # GitHub environment gate — configure on github.com/settings/environments
                        # Must match the environment name registered on pypi.org trusted publisher

    permissions:
      id-token: write   # required for OIDC trusted publishing — no API token needed

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # hatch-vcs needs full tag history to resolve the version

      - uses: astral-sh/setup-uv@v5

      - name: Build wheel and sdist
        run: uv build   # outputs to dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  docker:
    needs: publish
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4
        # No fetch-depth: 0 needed — we derive the version from the tag name, not git history

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}

      # PyPI may take up to ~60s to make a freshly published package available on the index.
      # Without this, pip install in the docker build can fail with "version not found".
      - name: Wait for PyPI propagation
        run: sleep 60

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: VERSION=${{ steps.meta.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
