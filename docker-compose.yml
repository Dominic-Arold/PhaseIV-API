services:
  api:
    image: ghcr.io/dominic-arold/phaseiv-api:latest
    ports:
      - "55555:80"
    volumes:
      - phaseiv_cache:/cache
    # Optionally to change defaults
    #environment:
    #  PHASEIV_CACHE_ENABLED: "true"
    #  PHASEIV_HTTP_TIMEOUT: "10"
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:80/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  phaseiv_cache:
